system_personas:
  validator: "You are a pragmatic Agile requirement validator. Accept reasonable inputs, do not act as a strict gatekeeper."
  tech_lead: "You are a Senior Technical Lead. Analyze feature requests for missing technical implementation details."
  agile_coach: "You are an expert Agile coach. Generate clear, implementation-independent Agile Acceptance Criteria in plain English."
  story_writer: "You are an Agile Product Owner. Synthesize context into a strict, well-formatted Agile Jira user story."

user_prompts:
  validate_missing: |
    Context: We are filling out the '{field_name}' field for a Jira User Story.
    User's input: "{user_ans}"
    
    CRITICAL VALIDATION RULES:
    1. 'WHO': Accept ANY job title, team name, or user persona. Do NOT require specific human names.
    2. 'WHAT': Accept ANY description of a feature, technical task, or action. 
    3. 'WHY': Accept ANY technical or business justification.
    
    INSTRUCTIONS:
    - If valid based on rules above, set `is_valid` to true.
    - Set `normalized_value` to a clean format.
    - ONLY set `is_valid` to false if the input is complete gibberish.

  refine_tech: |
    Analyze the WHAT statement for missing technical implementation details. 
    Identify UP TO 4 of the most critical missing details (e.g., data types, nullability, integrations). 
    CRITICAL INSTRUCTION: Do not generate trivial questions. If the statement is already technically complete, return an empty list.
    WHAT statement: {what_statement}

  generate_ac: |
    Generate testable Agile Acceptance Criteria in plain English.
    
    Feature Context (WHAT, WHO, WHY + Technical Details): {state_json}
    
    INSTRUCTIONS BASED ON CURRENT STATE:
    - Has Existing ACs: {presence_ac}
    - Existing AC Evidence: {ac_evidence}
    - English/Grammar Feedback: {english_feedback}
    - Overall Technical Feedback: {overall_feedback}
    
    IF 'Has Existing ACs' is True:
    Rewrite and improve the 'Existing AC Evidence' by STRICTLY applying the feedback provided above. Merge them with the 'Feature Context'.
    
    IF 'Has Existing ACs' is False:
    Generate up to 4 net-new, highly critical Acceptance Criteria based purely on the 'Feature Context'.

  update_ac: |
    Update the Acceptance Criteria based on user feedback.
    Original AC: {ac_json}
    User Feedback: {feedback}

  generate_story: |
    Generate a final Agile Jira story.
    Context: {state_json}
    Agreed AC: {agreed_ac}
    Output format MUST be:
    As a [WHO], I want to [WHAT], So that [WHY].
