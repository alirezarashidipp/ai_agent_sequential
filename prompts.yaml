system_personas:
  validator: "You are a strict Agile requirement validator. Your job is to evaluate if a user's input for a specific Jira field is valid. If invalid, you MUST provide a precise, 1-sentence rejection reason."
  agile_coach: "You are an expert Agile coach. Generate or refine clear, testable, and implementation-independent Agile Acceptance Criteria."
  story_writer: "You are an Agile Product Owner. Synthesize context into a strict, well-formatted Agile Jira user story."

user_prompts:
  validate_missing: |
    Context: We are evaluating the '{field_name}' field for a Jira User Story.
    User's input: "{user_ans}"
    
    CRITICAL VALIDATION RULES:
    1. 'WHO': Accept ANY job title, team name, or user persona. Reject specific human names or complete gibberish.
    2. 'WHAT': Accept ANY clear description of a feature, technical task, or action. Reject extremely vague statements like "do something" or "fix it".
    3. 'WHY': Accept ANY technical or business justification.
    
    INSTRUCTIONS:
    - If the input is valid based on the rules, set `is_valid` to true and format it in `normalized_value`.
    - If the input is invalid or vague, set `is_valid` to false, leave `normalized_value` null, and provide a strict 1-sentence `rejection_reason` explaining exactly why it failed so the user can fix it.

  generate_ac: |
    Generate testable Agile Acceptance Criteria.
    
    Feature Context:
    - WHO: {who}
    - WHAT: {what}
    - WHY: {why}
    - Technical Grooming Notes: {tech_notes}
    
    INSTRUCTIONS BASED ON CURRENT STATE:
    - Has Existing ACs: {presence_ac}
    - Existing AC Evidence: {ac_evidence}
    
    IF 'Has Existing ACs' is True:
    Rewrite and improve the 'Existing AC Evidence' by merging it with the 'Technical Grooming Notes' and core 'Feature Context'. Output a finalized list of clear criteria.
    
    IF 'Has Existing ACs' is False:
    Generate up to 4 net-new, highly critical Acceptance Criteria based purely on the 'Feature Context' and 'Technical Grooming Notes'.

  update_ac: |
    Update the Acceptance Criteria based on user feedback.
    Original AC: {ac_json}
    User Feedback: "{feedback}"
    
    Strictly apply the user's feedback to the Original AC and return the updated list.

  generate_story: |
    Generate a final Agile Jira story.
    
    Feature Context:
    - WHO: {who}
    - WHAT: {what}
    - WHY: {why}
    
    Finalized Acceptance Criteria: {agreed_ac}
    
    Output format MUST be:
    As a [WHO], I want to [WHAT], So that [WHY].
    Then list the Acceptance Criteria exactly as provided.

  update_story: |
    Update the final Jira Story or its Acceptance Criteria based on the user's final review.
    
    Original Story & AC: {story_json}
    User Feedback: "{feedback}"
    
    Strictly apply the feedback and return the updated Story and AC list. Do not drop information unless explicitly asked.
