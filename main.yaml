from models import ParsedJiraPayload
from llm_client import StructuredLLMClient
from agent import JiraGroomingAgent

def get_mock_payload() -> ParsedJiraPayload:
    # شبیه‌سازی خروجی سیستم NLP بالادستی
    mock_json = {
        "who": {"identified": True, "evidence": "Tfx team"},
        "what": {"identified": False, "evidence": None}, # باعث تریگر شدن سوالات داینامیک می‌شود
        "why": {"identified": True, "evidence": "store and manage additional data related to the project"},
        "ac_defined": {
            "presence_ac": True,
            "ac_evidence": "Ensure the system stores the data accurately.",
            "english_text_feedback": "Sentences are short but contain awkward phrasing.",
            "overal_feedback": "The description lacks technical specifics."
        },
        "grooming_questions": [
            "What is the exact name and data type of the new column?"
        ],
        "org_text": "As a Tfx team, we wanted to store and manage additional data related to the project. Ensure the system stores the data accurately."
    }
    return ParsedJiraPayload(**mock_json)

if __name__ == "__main__":
    try:
        payload = get_mock_payload()
        client = StructuredLLMClient() 
        agent = JiraGroomingAgent(client)
        
        # استارت پایپ‌لاین دو فازی
        agent.run(payload)
        
    except Exception as e:
        print(f"\n[SYSTEM HALT] Execution failed: {e}")
