import json
from models import ParsedJiraPayload
from llm_client import StructuredLLMClient
from agent import JiraStatelessPipeline

def get_mock_payload() -> ParsedJiraPayload:
    mock_dict = {
        "who": {
            "identified": True, 
            "evidence": "Tfx team"
        },
        "what": {
            "identified": False,
            "intent_evidence": None
        },
        "why": {
            "identified": True, 
            "value_evidence": "store and manage additional data related to the project"
        },
        "ac_defined": {
            "presence_ac": True,
            "ac_evidence": "Ensure the system stores the data accurately."
        },
        "grooming_questions": []
    }
    return ParsedJiraPayload(**mock_dict)

if __name__ == "__main__":
    print("[SYSTEM BOOT] Initializing Enterprise Stateless Jira Pipeline...")
    try:
        payload = get_mock_payload()
        client = StructuredLLMClient() 
        pipeline = JiraStatelessPipeline(client)
        
        final_state = pipeline.run(payload)
        
        print("\n" + "="*50)
        print("[SYSTEM TERMINATE] Pipeline Execution Completed Successfully.")
        print("Final Exportable Session State (JSON):")
        print(final_state.model_dump_json(indent=2))
        print("="*50)
        
    except Exception as e:
        print(f"\n[FATAL ERROR] Execution halted abruptly: {e}")
