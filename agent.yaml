import yaml
from pydantic import BaseModel, Field
from pathlib import Path
from typing import List, Optional
from models import ParsedJiraPayload, ValidationResult, AcceptanceCriteria, FinalStory
from llm_client import StructuredLLMClient

# ==========================================
# 1. SESSION STATE (The Independent Memory)
# ==========================================
class SessionState(BaseModel):

    
    what: Optional[str] = None
    why: Optional[str] = None
    who: Optional[str] = None
    tech_notes: List[str] = Field(default_factory=list)
    ac_list: List[str] = Field(default_factory=list)
    final_story: Optional[str] = None


# ==========================================
# 2. STATELESS PIPELINE (Behavior Only)
# ==========================================
class JiraStatelessPipeline:
    def __init__(self, llm_client: StructuredLLMClient, prompt_file: str = "prompts.yaml"):
        self.llm = llm_client
        self.prompts = self._load_prompts(prompt_file)

    def _load_prompts(self, filepath: str) -> dict:
        path = Path(filepath)
        with open(path, "r", encoding="utf-8") as file:
            return yaml.safe_load(file)

    # --- MAIN ORCHESTRATOR ---
    def run(self, payload: ParsedJiraPayload) -> SessionState:
        print("--- AI Jira Grooming Pipeline (Stateless) ---")
        state = SessionState()

        # Phase 1: 3W Validation (Pass state in, get mutated state out)
        state = self._resolve_core_triad(state, payload)

        # Phase 2: Technical Grooming (Bypass if WHAT was missing in upstream)
        if payload.what.identified and payload.grooming_questions:
            state = self._gather_technical_context(state, payload)
        else:
            print("\n[SYSTEM] WHAT was missing upstream. Skipping static grooming questions.")

        # Phase 3: AC Synthesis (With 3-try loop)
        state = self._synthesize_ac(state, payload)

        # Phase 4: Final Story (With 3-try loop)
        state = self._generate_final_story(state)

        return state

    # --- PHASE 1: CORE TRIAD ---
    def _resolve_core_triad(self, state: SessionState, payload: ParsedJiraPayload) -> SessionState:
        sys_prompt = self.prompts['system_personas']['validator']
        max_retries = 3

        # Mapping payload evidence to state
        fields_map = {
            'what': (payload.what.identified, payload.what.intent_evidence),
            'why': (payload.why.identified, payload.why.value_evidence),
            'who': (payload.who.identified, payload.who.evidence)
        }

        for field, (is_identified, evidence) in fields_map.items():
            if is_identified and evidence:
                setattr(state, field, evidence)
                continue

            # Field missing: Start 3-try validation loop
            retries = 0
            while getattr(state, field) is None:
                if retries >= max_retries:
                    print(f"\n[SYSTEM WARN] Max retries hit. Aborting or forcing raw input for {field.upper()}.")
                    setattr(state, field, f"Unknown {field}")
                    break

                user_ans = input(f"\nMissing {field.upper()}. Please clarify:\n> ").strip()
                if not user_ans:
                    continue

                user_prompt = self.prompts['user_prompts']['validate_missing'].format(
                    field_name=field.upper(), user_ans=user_ans
                )

                validation = self.llm.query(sys_prompt, user_prompt, ValidationResult)

                if validation.is_valid:
                    setattr(state, field, validation.normalized_value)
                else:
                    retries += 1
                    reason = validation.rejection_reason or "Invalid input."
                    print(f"\n[REJECTED] {reason} (Attempt {retries}/{max_retries})")

        return state

    # --- PHASE 2: GROOMING QUESTIONS ---
    def _gather_technical_context(self, state: SessionState, payload: ParsedJiraPayload) -> SessionState:
        print("\n[SYSTEM] Extracting technical details...")
        for i, question in enumerate(payload.grooming_questions, 1):
            ans = input(f"\nQuestion {i}/{len(payload.grooming_questions)}:\n{question}\n(Answer, or type 'skip'):\n> ").strip()
            if ans.lower() not in ["skip", "no", "n/a", ""]:
                state.tech_notes.append(f"Q: {question} | A: {ans}")
        return state

    # --- PHASE 3: AC SYNTHESIS (3 Tries) ---
    def _synthesize_ac(self, state: SessionState, payload: ParsedJiraPayload) -> SessionState:
        print("\n[SYSTEM] Synthesizing Acceptance Criteria...")
        sys_prompt = self.prompts['system_personas']['agile_coach']
        
        user_prompt = self.prompts['user_prompts']['generate_ac'].format(
            who=state.who, what=state.what, why=state.why, tech_notes=state.tech_notes,
            presence_ac=payload.ac_defined.presence_ac,
            ac_evidence=payload.ac_defined.ac_evidence or "None"
        )
        
        ac_draft = self.llm.query(sys_prompt, user_prompt, AcceptanceCriteria)
        current_ac = ac_draft.criteria
        
        # 3-Try Version Control Loop
        max_edits = 3
        for attempt in range(max_edits):
            print("\nProposed Acceptance Criteria:")
            for idx, crit in enumerate(current_ac, 1):
                print(f"{idx}. {crit}")
                
            feedback = input(f"\nDo you confirm these AC? (Type 'confirm' or provide edits. Edits left: {max_edits - attempt}):\n> ").strip()
            
            if feedback.lower() == 'confirm':
                break
                
            update_prompt = self.prompts['user_prompts']['update_ac'].format(
                ac_json={"criteria": current_ac}, feedback=feedback
            )
            updated_ac_draft = self.llm.query(sys_prompt, update_prompt, AcceptanceCriteria)
            current_ac = updated_ac_draft.criteria
            
            if attempt == max_edits - 1:
                print("\n[SYSTEM] Max edits reached. Locking AC.")

        state.ac_list = current_ac
        return state

    # --- PHASE 4: FINAL STORY (3 Tries) ---
    def _generate_final_story(self, state: SessionState) -> SessionState:
        print("\n[SYSTEM] Generating final Jira artifact...")
        sys_prompt = self.prompts['system_personas']['story_writer']
        
        user_prompt = self.prompts['user_prompts']['generate_story'].format(
            who=state.who, what=state.what, why=state.why, agreed_ac=state.ac_list
        )
        
        story_draft = self.llm.query(sys_prompt, user_prompt, FinalStory)
        current_story = story_draft
        
        # 3-Try Version Control Loop
        max_edits = 3
        for attempt in range(max_edits):
            print("\n" + "="*50 + "\nFINAL AGILE JIRA STORY\n" + "="*50)
            print(current_story.user_story)
            print("\nAcceptance Criteria:")
            for idx, crit in enumerate(current_story.acceptance_criteria, 1):
                print(f"{idx}. {crit}")
                
            feedback = input(f"\nDo you confirm this Story? (Type 'confirm' or provide edits. Edits left: {max_edits - attempt}):\n> ").strip()
            
            if feedback.lower() == 'confirm':
                break
                
            update_prompt = self.prompts['user_prompts']['update_story'].format(
                story_json=current_story.model_dump_json(), feedback=feedback
            )
            updated_story_draft = self.llm.query(sys_prompt, update_prompt, FinalStory)
            current_story = updated_story_draft
            
            if attempt == max_edits - 1:
                print("\n[SYSTEM] Max edits reached. Locking Story.")

        state.final_story = current_story.user_story
        state.ac_list = current_story.acceptance_criteria
        return state
