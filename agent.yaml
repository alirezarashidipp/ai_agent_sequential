import yaml
from pathlib import Path
from models import ParsedJiraPayload, ValidationResult, MissingTechnicalDetail, AcceptanceCriteria, FinalStory
from llm_client import StructuredLLMClient

class JiraGroomingAgent:
    def __init__(self, llm_client: StructuredLLMClient, prompt_file: str = "prompts.yaml"):
        self.llm = llm_client
        self.prompts = self._load_prompts(prompt_file)
        # Internal State
        self.context = {"who": None, "what": None, "why": None, "tech_notes": []}
        self.ac = []
        self.dynamic_what_flag = False

    def _load_prompts(self, filepath: str) -> dict:
        path = Path(filepath)
        with open(path, "r", encoding="utf-8") as file:
            return yaml.safe_load(file)

    def run(self, payload: ParsedJiraPayload):
        print("--- AI Jira Grooming Assistant ---")
        
        # 1. Initialize State
        self.context['who'] = payload.who.evidence if payload.who.identified else None
        self.context['what'] = payload.what.evidence if payload.what.identified else None
        self.context['why'] = payload.why.evidence if payload.why.identified else None
        
        # Track if WHAT was initially missing to trigger dynamic grooming later
        self.dynamic_what_flag = not payload.what.identified

        # 2. Sequential Core Resolution
        self._resolve_core_triad()
        
        # 3. Gather Technical Context (Dynamic or Static Routing)
        self._gather_technical_context(payload)
        
        # 4. AC Synthesis
        self._generate_and_review_ac(payload)
        
        # 5. Final Artifact
        self._generate_final_story()

    def _resolve_core_triad(self):
        sys_prompt = self.prompts['system_personas']['validator']
        max_retries = 3
        
        # Order matters: Ensure WHAT is resolved before WHO and WHY
        for field in ['what', 'who', 'why']:
            retries = 0
            last_ans = None
            
            while self.context[field] is None:
                if retries >= max_retries:
                    print(f"\n[SYSTEM WARN] Max retries hit. Forcing raw input for {field.upper()}.")
                    self.context[field] = last_ans or f"Unknown {field}"
                    break
                    
                user_ans = input(f"\nMissing {field.upper()}. Please clarify:\n> ").strip()
                if not user_ans:
                    continue
                    
                last_ans = user_ans
                user_prompt = self.prompts['user_prompts']['validate_missing'].format(
                    field_name=field.upper(), user_ans=user_ans
                )
                
                validation = self.llm.query(sys_prompt, user_prompt, ValidationResult)
                if validation.is_valid:
                    self.context[field] = validation.normalized_value
                else:
                    retries += 1
                    print(f"The LLM rejected the input. (Attempt {retries}/{max_retries})")

    def _gather_technical_context(self, payload: ParsedJiraPayload):
        questions = []
        
        if not self.dynamic_what_flag and payload.grooming_questions:
            print("\n[SYSTEM] Using pre-computed grooming questions.")
            questions = payload.grooming_questions
        else:
            print("\n[SYSTEM] Generating dynamic grooming questions based on refined WHAT.")
            sys_prompt = self.prompts['system_personas']['tech_lead']
            user_prompt = self.prompts['user_prompts']['refine_tech'].format(
                what_statement=self.context['what']
            )
            analysis = self.llm.query(sys_prompt, user_prompt, MissingTechnicalDetail)
            if analysis.has_missing_details and analysis.questions:
                questions = analysis.questions[:4] # Enforce absolute max of 4

        if questions:
            for i, q in enumerate(questions, 1):
                ans = input(f"\nQuestion {i}/{len(questions)}:\n{q}\n(Answer, or type 'skip'):\n> ").strip()
                if ans.lower() not in ["skip", "no", "n/a", ""]:
                    self.context['tech_notes'].append(ans)

    def _generate_and_review_ac(self, payload: ParsedJiraPayload):
        print("\n[SYSTEM] Synthesizing Acceptance Criteria...")
        sys_prompt = self.prompts['system_personas']['agile_coach']
        
        state_dump = f"WHO: {self.context['who']} | WHAT: {self.context['what']} | WHY: {self.context['why']} | Tech Notes: {self.context['tech_notes']}"
        
        user_prompt = self.prompts['user_prompts']['generate_ac'].format(
            state_json=state_dump,
            presence_ac=payload.ac_defined.presence_ac,
            ac_evidence=payload.ac_defined.ac_evidence or "None",
            english_feedback=payload.ac_defined.english_text_feedback or "None",
            overall_feedback=payload.ac_defined.overal_feedback or "None"
        )
        
        ac_draft = self.llm.query(sys_prompt, user_prompt, AcceptanceCriteria)
        
        print("\nProposed Acceptance Criteria:")
        for idx, crit in enumerate(ac_draft.criteria, 1):
            print(f"{idx}. {crit}")
            
        feedback = input("\nDo you confirm these AC, or would you like to add/modify? (Type 'confirm' or provide edits):\n> ").strip()
        
        if feedback.lower() != 'confirm':
            update_prompt = self.prompts['user_prompts']['update_ac'].format(
                ac_json={"criteria": ac_draft.criteria},
                feedback=feedback
            )
            final_ac = self.llm.query(sys_prompt, update_prompt, AcceptanceCriteria)
            self.ac = final_ac.criteria
        else:
            self.ac = ac_draft.criteria

    def _generate_final_story(self):
        print("\n[SYSTEM] Generating final Jira artifact...")
        sys_prompt = self.prompts['system_personas']['story_writer']
        
        state_dump = f"WHO: {self.context['who']} | WHAT: {self.context['what']} | WHY: {self.context['why']} | Tech Notes: {self.context['tech_notes']}"
        user_prompt = self.prompts['user_prompts']['generate_story'].format(
            state_json=state_dump,
            agreed_ac=self.ac
        )
        
        final = self.llm.query(sys_prompt, user_prompt, FinalStory)
        
        print("\n" + "="*50)
        print("FINAL AGILE JIRA STORY")
        print("="*50)
        print(final.user_story)
        print("\nAcceptance Criteria:")
        for idx, crit in enumerate(final.acceptance_criteria, 1):
            print(f"{idx}. {crit}")
